# 必须结合本项目的规则一起使用
#dns:
dns!:
  enable: true
  prefer-h3: true
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - '+.local'
    - '+.lan'
    - '+.arpa'
    - '+.battle.net'
    - '+.msftncsi.com'   
    - '+.services.googleapis.cn'
    - 'time.*.com'
  default-nameserver:  #用于解析下面的域名服务器的地址
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:  #代理节点的域名解析
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "rule-set:Lan,chinamaxNR,mydirect":
      - https://223.5.5.5/dns-query#h3=true
      - https://223.6.6.6/dns-query#h3=true
    "rule-set:Emby,Apple":
      - https://223.5.5.5/dns-query#h3=true
      - https://223.6.6.6/dns-query#h3=true
      - https://doh.dns.sb/dns-query
      - https://dns.google/dns-query
  nameserver:
    #- https://223.5.5.5/dns-query#h3=true
    #- https://223.6.6.6/dns-query#h3=true
    #- 223.5.5.5
    #- 119.29.29.29
    - https://mozilla.cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://dns.quad9.net/dns-query
    
  

